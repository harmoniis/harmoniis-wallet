name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # MSVC setup for Windows (Harmonia pattern)
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Force MSVC compiler tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "CC=cl.exe" >> $env:GITHUB_ENV
          "CXX=cl.exe" >> $env:GITHUB_ENV
          "AR=lib.exe" >> $env:GITHUB_ENV
          "CC_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV
          "CXX_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --no-default-features --features bundled-sqlite,gpu

      - name: Build
        run: cargo build --no-default-features --features bundled-sqlite,gpu

      - name: Unit tests
        run: cargo test --no-default-features --features bundled-sqlite,gpu --test unit_tests

      - name: Local simulation tests
        run: cargo test --no-default-features --features bundled-sqlite,gpu --test local_sim

      - name: Check actix-actors feature
        if: runner.os == 'Linux'
        run: cargo check --lib --no-default-features --features bundled-sqlite,actix-actors

      - name: Check s3-storage feature
        if: runner.os == 'Linux'
        run: cargo check --lib --no-default-features --features bundled-sqlite,s3-storage

  test-freebsd:
    name: Test (FreeBSD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test in FreeBSD VM
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: "14.2"
          architecture: x86-64
          memory: 8G
          cpu_count: 4
          shell: bash
          sync_files: true
          run: |
            set -euo pipefail
            export IGNORE_OSVERSION=yes
            sudo pkg install -y curl bash ca_root_nss
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            . "$HOME/.cargo/env"
            cargo build --release --no-default-features --features bundled-sqlite
            cargo test --release --no-default-features --features bundled-sqlite --test unit_tests
            cargo test --release --no-default-features --features bundled-sqlite --test local_sim

  msrv:
    name: MSRV (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86
      - run: cargo build --no-default-features --features bundled-sqlite

  release:
    name: Release (${{ matrix.platform }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, test-freebsd]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — GPU + CUDA (Ubuntu 22.04 for GLIBC 2.35 — works on Vast.ai cuda:12.2.2-devel-ubuntu22.04)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            features: bundled-sqlite,gpu,cuda
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
            features: bundled-sqlite,gpu,cuda
          # macOS — GPU (wgpu only, no CUDA)
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
            features: bundled-sqlite,gpu
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
            features: bundled-sqlite,gpu
          # Windows — GPU + CUDA
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            features: bundled-sqlite,gpu,cuda
          # FreeBSD — GPU (wgpu only, no CUDA)
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            platform: freebsd-x86_64
            features: bundled-sqlite,gpu
            freebsd_vm: true
            freebsd_version: "14.2"
            freebsd_arch: x86-64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        if: "!matrix.freebsd_vm"
        with:
          targets: ${{ matrix.target }}

      # MSVC setup for Windows release builds
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Force MSVC compiler tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "CC=cl.exe" >> $env:GITHUB_ENV
          "CXX=cl.exe" >> $env:GITHUB_ENV
          "AR=lib.exe" >> $env:GITHUB_ENV
          "CC_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV
          "CXX_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV

      - uses: actions/cache@v4
        if: "!matrix.freebsd_vm"
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.platform }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.platform }}-

      # FreeBSD release build via VM
      - name: Build release binary (FreeBSD VM)
        if: matrix.freebsd_vm
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: ${{ matrix.freebsd_version }}
          architecture: ${{ matrix.freebsd_arch }}
          memory: 8G
          cpu_count: 4
          shell: bash
          sync_files: true
          run: |
            set -euo pipefail
            export IGNORE_OSVERSION=yes
            sudo pkg install -y curl bash ca_root_nss
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            . "$HOME/.cargo/env"
            cargo build --release --no-default-features --features ${{ matrix.features }}
            VERSION=${GITHUB_REF_NAME#v}
            bash scripts/build_release.sh "$VERSION" "${{ matrix.platform }}"

      # Native release build (Windows — pwsh to avoid Git link.exe conflict)
      - name: Build release binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build --release --no-default-features --features ${{ matrix.features }}

      # Native release build (Unix)
      - name: Build release binary
        if: "!matrix.freebsd_vm && runner.os != 'Windows'"
        shell: bash
        run: |
          HOST_TARGET=$(rustc -vV | grep host | awk '{print $2}')
          if [ "${{ matrix.target }}" != "$HOST_TARGET" ]; then
            cargo build --release --no-default-features --features ${{ matrix.features }} --target ${{ matrix.target }}
            # Copy cross-compiled artifacts for build_release.sh
            mkdir -p target/release
            cp target/${{ matrix.target }}/release/hrmw target/release/ 2>/dev/null || true
          else
            cargo build --release --no-default-features --features ${{ matrix.features }}
          fi

      - name: Build release tarball
        if: "!matrix.freebsd_vm"
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          bash scripts/build_release.sh "$VERSION" "${{ matrix.platform }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            harmoniis-wallet-*-${{ matrix.platform }}.tar.gz
            harmoniis-wallet-*-${{ matrix.platform }}.tar.gz.sha256

      - name: Upload install scripts
        if: matrix.platform == 'linux-x86_64'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            install.ps1

  publish-crate:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Skip publish when token is unavailable
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish"

      - name: Publish
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --no-default-features --features bundled-sqlite
