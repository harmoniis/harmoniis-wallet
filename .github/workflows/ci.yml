name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --no-default-features --features bundled-sqlite,gpu

      - name: Build
        run: cargo build --no-default-features --features bundled-sqlite,gpu

      - name: Unit tests
        run: cargo test --no-default-features --features bundled-sqlite --test unit_tests

      - name: Local simulation tests
        run: cargo test --no-default-features --features bundled-sqlite --test local_sim

  msrv:
    name: MSRV (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86
      - run: cargo build --no-default-features --features bundled-sqlite

  release:
    name: Release (${{ matrix.platform }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.best_effort || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native builds
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
          # FreeBSD via cross
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            platform: freebsd-x86_64
            use_cross: true
          # NetBSD targets (tier 3 — nightly + build-std + NetBSD sysroot)
          - os: ubuntu-latest
            target: x86_64-unknown-netbsd
            platform: netbsd-x86_64
            use_netbsd_cross: true
            best_effort: true
          - os: ubuntu-latest
            target: aarch64-unknown-netbsd
            platform: netbsd-aarch64
            use_netbsd_cross: true
            best_effort: true
          - os: ubuntu-latest
            target: riscv64gc-unknown-netbsd
            platform: netbsd-riscv64
            use_netbsd_cross: true
            best_effort: true
          - os: ubuntu-latest
            target: powerpc-unknown-netbsd
            platform: netbsd-powerpc
            use_netbsd_cross: true
            best_effort: true
          - os: ubuntu-latest
            target: sparc64-unknown-netbsd
            platform: netbsd-sparc64
            use_netbsd_cross: true
            best_effort: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.use_netbsd_cross }}
        with:
          targets: ${{ matrix.target }}

      - uses: dtolnay/rust-toolchain@nightly
        if: matrix.use_netbsd_cross
        with:
          components: rust-src

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.platform }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.platform }}-

      - name: Install cross
        if: matrix.use_cross
        run: |
          rustup toolchain install nightly
          cargo +nightly install cross --git https://github.com/cross-rs/cross

      - name: Install NetBSD cross-toolchain
        if: matrix.use_netbsd_cross
        shell: bash
        run: |
          ARCH="${{ matrix.target }}"
          ARCH="${ARCH%%-*}"
          case "$ARCH" in
            x86_64)     GCC_ARCH="x86_64"   ; NBSD_ARCH="amd64"            ; CC_NAME="x86_64--netbsd" ;;
            aarch64)    GCC_ARCH="aarch64"   ; NBSD_ARCH="evbarm-aarch64"   ; CC_NAME="aarch64--netbsd" ;;
            riscv64gc)  GCC_ARCH="riscv64"   ; NBSD_ARCH="riscv-riscv64"    ; CC_NAME="riscv64gc--netbsd" ;;
            powerpc)    GCC_ARCH="powerpc"   ; NBSD_ARCH="evbppc"           ; CC_NAME="powerpc--netbsd" ;;
            sparc64)    GCC_ARCH="sparc64"   ; NBSD_ARCH="sparc64"          ; CC_NAME="sparc64--netbsd" ;;
          esac
          sudo apt-get update
          sudo apt-get install -y gcc-${GCC_ARCH}-linux-gnu || true
          NETBSD_VER="10.1"
          NETBSD_URL="https://cdn.netbsd.org/pub/NetBSD/NetBSD-${NETBSD_VER}/${NBSD_ARCH}/binary/sets"
          SYSROOT="/opt/netbsd-sysroot"
          sudo mkdir -p "$SYSROOT"
          for set in base comp; do
            echo "Downloading ${set}.tar.xz..."
            curl -fsSL "${NETBSD_URL}/${set}.tar.xz" -o "/tmp/${set}.tar.xz" || \
            curl -fsSL "${NETBSD_URL}/${set}.tgz" -o "/tmp/${set}.tgz" || true
            if [ -f "/tmp/${set}.tar.xz" ]; then
              sudo tar xf "/tmp/${set}.tar.xz" -C "$SYSROOT"
            elif [ -f "/tmp/${set}.tgz" ]; then
              sudo tar xzf "/tmp/${set}.tgz" -C "$SYSROOT"
            fi
          done
          # Create wrapper scripts matching cc-rs expected names
          for tool_suffix in gcc cc; do
            WRAPPER="/usr/local/bin/${CC_NAME}-${tool_suffix}"
            sudo tee "$WRAPPER" > /dev/null <<WRAPPER_EOF
#!/bin/sh
exec ${GCC_ARCH}-linux-gnu-gcc --sysroot=${SYSROOT} "\$@"
WRAPPER_EOF
            sudo chmod +x "$WRAPPER"
          done
          AR_WRAPPER="/usr/local/bin/${CC_NAME}-ar"
          sudo tee "$AR_WRAPPER" > /dev/null <<WRAPPER_EOF
#!/bin/sh
exec ${GCC_ARCH}-linux-gnu-ar "\$@"
WRAPPER_EOF
          sudo chmod +x "$AR_WRAPPER"
          mkdir -p .cargo
          cat >> .cargo/config.toml <<CARGO_EOF
[target.${{ matrix.target }}]
linker = "${CC_NAME}-gcc"
CARGO_EOF
          TARGET_UPPER=$(echo "${{ matrix.target }}" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
          echo "CC_${TARGET_UPPER}=${CC_NAME}-gcc" >> $GITHUB_ENV
          echo "AR_${TARGET_UPPER}=${CC_NAME}-ar" >> $GITHUB_ENV

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_netbsd_cross }}" = "true" ]; then
            cargo +nightly build --release --no-default-features --features bundled-sqlite \
              --target ${{ matrix.target }} -Z build-std=std,panic_abort
          elif [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --no-default-features --features bundled-sqlite --target ${{ matrix.target }}
          else
            HOST_TARGET=$(rustc -vV | grep host | awk '{print $2}')
            if [ "${{ matrix.target }}" != "$HOST_TARGET" ]; then
              cargo build --release --no-default-features --features bundled-sqlite --target ${{ matrix.target }}
            else
              cargo build --release --no-default-features --features bundled-sqlite
            fi
          fi
          # Copy cross-compiled artifacts to target/release for build_release.sh
          if [ "${{ matrix.target }}" != "$(rustc -vV | grep host | awk '{print $2}')" ]; then
            mkdir -p target/release
            cp target/${{ matrix.target }}/release/hrmw target/release/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/hrmw.exe target/release/ 2>/dev/null || true
          fi

      - name: Build release tarball
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          bash scripts/build_release.sh "$VERSION" "${{ matrix.platform }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            harmoniis-wallet-*-${{ matrix.platform }}.tar.gz
            harmoniis-wallet-*-${{ matrix.platform }}.tar.gz.sha256

      - name: Upload install script
        if: matrix.platform == 'linux-x86_64'
        uses: softprops/action-gh-release@v2
        with:
          files: install.sh

  publish-crate:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-default-features --features bundled-sqlite
