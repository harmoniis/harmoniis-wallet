name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  webylib-on-crates-io:
    name: webylib published (crates.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required webylib version exists on crates.io
        shell: bash
        run: |
          set -euo pipefail
          ver=$(grep -E 'webylib' Cargo.toml | grep -v '#' | grep 'version' | head -1 | sed -E 's/.*version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [[ -z "$ver" || "$ver" == *webylib* ]]; then
            echo "Could not parse webylib version from Cargo.toml"
            exit 1
          fi
          echo "Cargo.toml requires webylib $ver — checking crates.io…"
          code=$(curl -sS -A "harmoniis-wallet-ci (https://github.com/harmoniis/harmoniis-wallet)" -o /tmp/crates-webylib.json -w '%{http_code}' "https://crates.io/api/v1/crates/webylib/${ver}")
          if [[ "$code" != "200" ]]; then
            echo "webylib $ver is not on crates.io (HTTP $code). Release webylib first, wait for publish-crate, then tag this repo."
            exit 1
          fi
          echo "OK: webylib $ver is published."

  test:
    name: Test (${{ matrix.os }})
    needs: [webylib-on-crates-io]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # MSVC setup for Windows (Harmonia pattern)
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Force MSVC compiler tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "CC=cl.exe" >> $env:GITHUB_ENV
          "CXX=cl.exe" >> $env:GITHUB_ENV
          "AR=lib.exe" >> $env:GITHUB_ENV
          "CC_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV
          "CXX_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --no-default-features --features bundled-sqlite,gpu

      - name: Build
        run: cargo build --no-default-features --features bundled-sqlite,gpu

      - name: Unit tests
        run: cargo test --no-default-features --features bundled-sqlite,gpu --test unit_tests

      - name: Local simulation tests
        run: cargo test --no-default-features --features bundled-sqlite,gpu --test local_sim

      - name: Check actix-actors feature
        if: runner.os == 'Linux'
        run: cargo check --lib --no-default-features --features bundled-sqlite,actix-actors

  # ── Mobile compile check ─────────────────────────────────────────
  mobile-check:
    name: Mobile check (${{ matrix.target }})
    needs: [webylib-on-crates-io]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-ios
            runner: macos-latest
          - target: aarch64-apple-ios-sim
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Check (library only)
        run: cargo check --target ${{ matrix.target }} --lib --no-default-features --features bundled-sqlite

  test-freebsd:
    name: Test (FreeBSD)
    needs: [webylib-on-crates-io]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test in FreeBSD VM
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: "14.2"
          architecture: x86-64
          memory: 8G
          cpu_count: 4
          shell: bash
          sync_files: true
          run: |
            set -euo pipefail
            export IGNORE_OSVERSION=yes
            sudo pkg install -y curl bash ca_root_nss
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            . "$HOME/.cargo/env"
            cargo build --release --no-default-features --features bundled-sqlite
            cargo test --release --no-default-features --features bundled-sqlite --test unit_tests
            cargo test --release --no-default-features --features bundled-sqlite --test local_sim

  msrv:
    name: MSRV (1.86)
    needs: [webylib-on-crates-io]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86
      - run: cargo build --no-default-features --features bundled-sqlite

  release:
    name: Release (${{ matrix.platform }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, test-freebsd, mobile-check]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Desktop / Server ──
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            features: bundled-sqlite,gpu,cuda
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
            features: bundled-sqlite,gpu,cuda
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
            features: bundled-sqlite,gpu
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
            features: bundled-sqlite,gpu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            features: bundled-sqlite,gpu,cuda
          # FreeBSD
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            platform: freebsd-x86_64
            features: bundled-sqlite,gpu
            freebsd_vm: true
            freebsd_version: "14.2"
            freebsd_arch: x86-64
          # ── iOS — library only (SDK use) ──
          - os: macos-latest
            target: aarch64-apple-ios
            platform: ios-aarch64
            features: bundled-sqlite
            lib_only: true
          - os: macos-latest
            target: aarch64-apple-ios-sim
            platform: ios-aarch64-sim
            features: bundled-sqlite
            lib_only: true
          # ── Android — library only (SDK use), vendored OpenSSL ──
          - os: ubuntu-latest
            target: aarch64-linux-android
            platform: android-aarch64
            features: bundled-sqlite,vendored-openssl
            lib_only: true
            android: true
          - os: ubuntu-latest
            target: armv7-linux-androideabi
            platform: android-armv7
            features: bundled-sqlite,vendored-openssl
            lib_only: true
            android: true
          - os: ubuntu-latest
            target: x86_64-linux-android
            platform: android-x86_64
            features: bundled-sqlite,vendored-openssl
            lib_only: true
            android: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        if: "!matrix.freebsd_vm"
        with:
          targets: ${{ matrix.target }}

      # MSVC setup for Windows release builds
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Force MSVC compiler tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "CC=cl.exe" >> $env:GITHUB_ENV
          "CXX=cl.exe" >> $env:GITHUB_ENV
          "AR=lib.exe" >> $env:GITHUB_ENV
          "CC_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV
          "CXX_x86_64_pc_windows_msvc=cl.exe" >> $env:GITHUB_ENV

      # Android NDK setup (matching webylib pattern)
      - name: Setup Android NDK
        if: matrix.android
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Configure Android toolchain
        if: matrix.android
        shell: bash
        run: |
          NDK="${{ steps.ndk.outputs.ndk-path }}"
          TOOLCHAIN="${NDK}/toolchains/llvm/prebuilt/linux-x86_64"
          case "${{ matrix.target }}" in
            aarch64-linux-android)   CLANG_PREFIX="aarch64-linux-android24" ; BARE_PREFIX="aarch64-linux-android" ;;
            armv7-linux-androideabi) CLANG_PREFIX="armv7a-linux-androideabi24" ; BARE_PREFIX="arm-linux-androideabi" ;;
            x86_64-linux-android)   CLANG_PREFIX="x86_64-linux-android24" ; BARE_PREFIX="x86_64-linux-android" ;;
          esac
          CC="${TOOLCHAIN}/bin/${CLANG_PREFIX}-clang"
          AR="${TOOLCHAIN}/bin/llvm-ar"
          RANLIB="${TOOLCHAIN}/bin/llvm-ranlib"
          ENV_TARGET=$(echo "${{ matrix.target }}" | tr 'a-z-' 'A-Z_')
          echo "CC_${ENV_TARGET}=${CC}" >> "$GITHUB_ENV"
          echo "AR_${ENV_TARGET}=${AR}" >> "$GITHUB_ENV"
          echo "RANLIB_${ENV_TARGET}=${RANLIB}" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_${ENV_TARGET}_LINKER=${CC}" >> "$GITHUB_ENV"
          echo "${TOOLCHAIN}/bin" >> "$GITHUB_PATH"
          ln -sf "${CC}" "${TOOLCHAIN}/bin/${BARE_PREFIX}-clang"
          ln -sf "${TOOLCHAIN}/bin/llvm-ar" "${TOOLCHAIN}/bin/${BARE_PREFIX}-ar"

      - uses: actions/cache@v4
        if: "!matrix.freebsd_vm"
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.platform }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.platform }}-

      # FreeBSD release build via VM
      - name: Build release binary (FreeBSD VM)
        if: matrix.freebsd_vm
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: ${{ matrix.freebsd_version }}
          architecture: ${{ matrix.freebsd_arch }}
          memory: 8G
          cpu_count: 4
          shell: bash
          sync_files: true
          run: |
            set -euo pipefail
            export IGNORE_OSVERSION=yes
            sudo pkg install -y curl bash ca_root_nss
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            . "$HOME/.cargo/env"
            cargo build --release --no-default-features --features ${{ matrix.features }}
            VERSION=${GITHUB_REF_NAME#v}
            bash scripts/build_release.sh "$VERSION" "${{ matrix.platform }}"

      # Native release build (Windows — pwsh to avoid Git link.exe conflict)
      - name: Build release binary (Windows)
        if: runner.os == 'Windows' && !matrix.lib_only
        shell: pwsh
        run: cargo build --release --no-default-features --features ${{ matrix.features }}

      # Library-only build (iOS, Android — no CLI binary)
      - name: Build library (mobile)
        if: matrix.lib_only
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} --lib --no-default-features --features ${{ matrix.features }}

      # Desktop/Server release build (Unix)
      - name: Build release binary
        if: "!matrix.freebsd_vm && !matrix.lib_only && runner.os != 'Windows'"
        shell: bash
        run: |
          HOST_TARGET=$(rustc -vV | grep host | awk '{print $2}')
          if [ "${{ matrix.target }}" != "$HOST_TARGET" ]; then
            cargo build --release --no-default-features --features ${{ matrix.features }} --target ${{ matrix.target }}
            mkdir -p target/release
            cp target/${{ matrix.target }}/release/hrmw target/release/ 2>/dev/null || true
          else
            cargo build --release --no-default-features --features ${{ matrix.features }}
          fi

      # Package desktop releases (CLI binary + docs)
      - name: Build release tarball
        if: "!matrix.freebsd_vm && !matrix.lib_only"
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          bash scripts/build_release.sh "$VERSION" "${{ matrix.platform }}"

      # Package library releases (static/dynamic libs for SDK)
      - name: Package library
        if: matrix.lib_only
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          STAGING="harmoniis-wallet-${VERSION}-${{ matrix.platform }}"
          mkdir -p "$STAGING"
          cp LICENSE README.md CHANGELOG.md "$STAGING/"
          find "target/${TARGET}/release" -maxdepth 1 \
            \( -name '*.a' -o -name '*.so' -o -name '*.dylib' \) \
            -exec cp {} "$STAGING/" \;
          tar czf "${STAGING}.tar.gz" "$STAGING"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          else
            shasum -a 256 "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            harmoniis-wallet-*-${{ matrix.platform }}.tar.gz
            harmoniis-wallet-*-${{ matrix.platform }}.tar.gz.sha256

      - name: Upload install scripts
        if: matrix.platform == 'linux-x86_64'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            install.ps1

  publish-crate:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Skip publish when token is unavailable
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish"

      - name: Publish
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --no-default-features --features bundled-sqlite
